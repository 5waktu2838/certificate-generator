<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roblox Certificate Generator - Multi Template</title>
    <style>
        :root {
            --primary: #1E3A8A;
            --accent: #2563EB;
            --accent-hover: #1D4ED8;
            --bg-main: #F0F4F8;
            --bg-card: #FFFFFF;
            --text-main: #1E293B;
            --border: #CBD5E1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .mobile-container {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background-color: var(--bg-card);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 { 
            font-size: 22px; 
            font-weight: 800;
            margin: 0 0 6px 0;
            color: var(--primary);
        }

        header p { 
            color: #64748B; 
            margin: 0; 
            font-size: 13px; 
        }
        
        .canvas-wrapper {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            touch-action: none;
        }
        
        canvas { 
            display: block;
            width: 100%;
            height: auto; 
            background: #E2E8F0;
        }
        
        .control-panel { 
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
        }

        /* Styling baru untuk Dropdown Pilihan */
        select, input[type="text"] {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            border: 1px solid var(--border);
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
            background-color: #F8FAFC;
            font-family: inherit;
        }
        select:focus, input[type="text"]:focus {
            border-color: var(--accent);
            background-color: #FFF;
        }

        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            margin-top: 5px;
        }
        .btn-download:hover { background-color: var(--accent-hover); }
        .btn-download:disabled { background-color: #CBD5E1; color: #94A3B8; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>

    <div class="mobile-container">
        <header>
            <h1>Oink Cert Maker Pro 🎓</h1>
            <p>Pilih tipe sertifikat, ketik nama, lalu geser posisinya jika perlu</p>
        </header>
        
        <div class="canvas-wrapper" id="canvas-holder">
            <canvas id="certCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="input-group">
                <label for="template-select">Pilih Tipe Sertifikat</label>
                <select id="template-select">
                    <option value="sertifikat1.png">Sertifikat Komentar Pertama 💬</option>
                    <option value="sertifikat2.png">Sertifikat Reply Pertama 🔁</option>
                </select>
            </div>

            <div class="input-group">
                <label for="name-input">Nama Pemenang</label>
                <input type="text" id="name-input" placeholder="Masukkan nama di sini..." autocomplete="off" disabled>
            </div>
            
            <button id="download-btn" class="btn-download" disabled>📥 Download Sertifikat (PNG)</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('name-input');
        const downloadBtn = document.getElementById('download-btn');
        const templateSelect = document.getElementById('template-select');
        const canvasHolder = document.getElementById('canvas-holder');

        // Menyimpan objek Image yang sedang aktif
        let certActiveImg = new Image();
        
        let textX = 0;
        let textY = 0;
        let namaTeks = "";
        let fontSize = 0;
        let isDragging = false;

        // Fungsi untuk memuat gambar sertifikat berdasarkan pilihan dropdown
        function muatTemplate(namaFile) {
            nameInput.disabled = true; // Kunci input sebentar saat loading gambar
            certActiveImg = new Image();
            certActiveImg.src = namaFile;

            certActiveImg.onload = () => {
                canvas.width = certActiveImg.width;
                canvas.height = certActiveImg.height;
                
                // Atur ulang posisi default teks ke tengah garis (39.5% lebar, 52.5% tinggi)
                textX = canvas.width * 0.395;
                textY = canvas.height * 0.525;
                fontSize = Math.round(canvas.height * 0.045);

                nameInput.disabled = false;
                renderSertifikat();
            };
        }

        // Jalankan template pertama kali saat web dibuka
        muatTemplate(templateSelect.value);

        // Event ketika dropdown pilihan sertifikat diubah oleh user
        templateSelect.addEventListener('change', (e) => {
            muatTemplate(e.target.value);
        });

        // Fungsi Render Utama Gambar + Teks
        function renderSertifikat() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(certActiveImg, 0, 0, canvas.width, canvas.height);

            if (namaTeks.trim() !== "") {
                ctx.save();
                ctx.font = `bold ${fontSize}px Georgia, serif`;
                ctx.fillStyle = '#112244';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                
                ctx.fillText(namaTeks, textX, textY);
                ctx.restore();
                
                canvasHolder.style.cursor = 'move';
                downloadBtn.disabled = false;
            } else {
                canvasHolder.style.cursor = 'default';
                downloadBtn.disabled = true;
            }
        }

        nameInput.addEventListener('input', (e) => {
            namaTeks = e.target.value;
            renderSertifikat();
        });

        // --- INTERAKSI GESER TEKS ---
        function dapatkanKoordinat(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = (clientX - rect.left) * (canvas.width / rect.width);
            const y = (clientY - rect.top) * (canvas.height / rect.height);
            return { x, y };
        }

        function mulaiGeser(e) {
            if (namaTeks.trim() === "") return;
            const pos = dapatkanKoordinat(e);
            
            const estimasiLebarTeks = ctx.measureText(namaTeks).width || (namaTeks.length * fontSize * 0.5);
            const batasKiri = textX - (estimasiLebarTeks / 2) - 40;
            const batasKanan = textX + (estimasiLebarTeks / 2) + 40;
            const batasAtas = textY - fontSize - 20;
            const batasBawah = textY + 20;

            if (pos.x >= batasKiri && pos.x <= batasKanan && pos.y >= batasAtas && pos.y <= batasBawah) {
                isDragging = true;
                e.preventDefault();
            }
        }

        function prosesGeser(e) {
            if (!isDragging) return;
            e.preventDefault();
            const pos = dapatkanKoordinat(e);
            textX = pos.x;
            textY = pos.y;
            renderSertifikat();
        }

        function selesaiGeser() { isDragging = false; }

        canvasHolder.addEventListener('mousedown', mulaiGeser);
        window.addEventListener('mousemove', prosesGeser);
        window.addEventListener('mouseup', selesaiGeser);
        canvasHolder.addEventListener('touchstart', mulaiGeser);
        window.addEventListener('touchmove', prosesGeser);
        window.addEventListener('touchend', selesaiGeser);

        // Download Final Gambar (.png)
        downloadBtn.addEventListener('click', () => {
            const namaFile = namaTeks.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const tipeSertifikat = templateSelect.value.split('.')[0]; // mengambil nama 'sertifikat1' atau 'sertifikat2'
            const link = document.createElement('a');
            link.download = `${tipeSertifikat}-${namaFile || 'player'}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
